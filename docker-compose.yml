services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: flashcard-postgres
    environment:
      POSTGRES_DB: flashcard_db
      POSTGRES_USER: flashcard_user
      POSTGRES_PASSWORD: flashcard_password
    volumes:
      - ./backend/data/postgres:/var/lib/postgresql/data
      - ./backend/init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - flashcard-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashcard_user -d flashcard_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: flashcard-backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://flashcard_user:flashcard_password@postgres:5432/flashcard_db
    volumes:
      - ./backend/app:/app/app
      - ./backend/main.py:/app/main.py
    command: uvicorn app.main:app --host 0.0.0.0 --port 3001 --reload
    networks:
      - flashcard-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:3001
    container_name: flashcard-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - flashcard-network

networks:
  flashcard-network:
    driver: bridge
